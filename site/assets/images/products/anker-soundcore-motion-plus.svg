  <rect x="535" y="390" width="130" height="10" rx="5" fill="#d1d5db" opacity="0.8"/>
  <rect x="535" y="410" width="130" height="10" rx="5" fill="#d1d5db" opacity="0.8"/>

  <text x="600" y="165" fill="#d1d5db" font-family="Arial, Helvetica, sans-serif" font-size="38" text-anchor="middle">Boxe portabile</text>
  <text x="600" y="225" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" text-anchor="middle">Anker Soundcore Motion+</text>
