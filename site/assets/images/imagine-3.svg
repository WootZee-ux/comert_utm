<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 500'>
  <defs>
    <linearGradient id='g3' x1='0' y1='0' x2='1' y2='1'>
      <stop offset='0%' stop-color='hsl(120,85%,55%)'/>
      <stop offset='100%' stop-color='hsl(220,80%,45%)'/>
    </linearGradient>
    <filter id='f3'>
